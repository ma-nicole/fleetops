version: "3.9"

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: fleetopt
      MYSQL_USER: fleetopt
      MYSQL_PASSWORD: fleetopt
    ports:
      - "3306:3306"
    volumes:
      - fleetopt_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  fleetopt_data:
