[build]
  base = "frontend"
  command = "npm ci --include=dev && npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NEXT_PUBLIC_API_URL = "https://fleetops-production-b2b7.up.railway.app/api"
  BACKEND_ORIGIN = "https://fleetops-production-b2b7.up.railway.app"
